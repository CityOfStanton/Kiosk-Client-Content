name: Set Input Configuration
on:
  workflow_dispatch:
    inputs:
      setting_file:
        required: true
        description: The Settings to apply to the target input
        type: choice
        options:
          - Menu/RegularMenu
          - Menu/TournamentMenu
          - Menu/TournamentMenuWithoutBreakfast
          - Menu/WinterFest
          - Calendar/WeekView
          - External/IgniteAthletics
          - OutOfSchoolBash/Current
          - OutOfSchoolBash/Postponed
          - Leagues/Baseball/SpringRegistrationStartingSoon
          - Leagues/Baseball/FallRegistrationStartingSoon
          - Leagues/Baseball/RegistrationGoingOnNow
          - Leagues/Baseball/WelcomeToRegistration
          - Leagues/Basketball/Registration
          - Leagues/Soccer/SpringRegistrationStartingSoon
          - Leagues/Soccer/SummerRegistrationStartingSoon
          - Leagues/Soccer/FallRegistrationStartingSoon
          - Leagues/Soccer/RegistrationGoingOnNow
          - Leagues/Soccer/WelcomeToRegistration
          - Leagues/Softball/RegistrationGoingOnNow
          - Leagues/Softball/SummerRegistrationStartingSoon
          - Leagues/Softball/WelcomeToRegistration
          - Leagues/FlagFootball/Registration
          - Leagues/Volleyball/Registration
          - Leagues/Combo/FallRegistrationStartingSoon

      target_input:
        required: true
        description: The input to change
        type: choice
        options:
          - Input1
          - Input2
          - Input3
          - Input4
          - Input5

jobs:
  set-input-configuration:
    runs-on: ubuntu-latest

    permissions:
      repository-projects: write
      contents: write

    env:
      SETTINGS_FILE: ${{ inputs.setting_file }}
      TARGET_INPUT: ${{ inputs.target_input }}

    steps:
      - name: Checkout files
        uses: actions/checkout@v3
        with:
          sparse-checkout: |
            Settings
            StantonCityPark

      - name: Copy ${{ inputs.setting_file }} to ${{ inputs.target_input }}
        run: |
          cp ${GITHUB_WORKSPACE}/Settings/$SETTINGS_FILE/Settings.json ${GITHUB_WORKSPACE}/StantonCityPark/ConcessionStand/$TARGET_INPUT/Settings.json

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ${GITHUB_WORKSPACE}/StantonCityPark/ConcessionStand/$TARGET_INPUT/Settings.json
          git commit -m "Copied $SETTINGS_FILE to $TARGET_INPUT"
          git push